<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app-container">
    <aside id="doc-panel">
      <h2 class="panel-title">Document Management</h2>

      <form id="upload-form">
        <label class="section-label">Upload Document</label>
        <div class="file-row">
          <input type="file" id="file-input" accept=".pdf,.doc,.docx,.txt,.md" />
        </div>
        <button type="button" id="upload-btn">Upload</button>
      </form>

      <div class="divider"></div>

      <div class="docs-section">
        <label class="section-label">Uploaded Documents</label>
        <div id="uploaded-docs">
          <p id="empty-msg">No documents uploaded yet</p>
        </div>
      </div>

      <div class="divider"></div>

      <div class="retrieval-section">
        <label class="section-label" for="retrieval-method">Retrieval Method</label>
        <select id="retrieval-method">
          <option value="semantic">Semantic (Embeddings)</option>
          <option value="tfidf">TF-IDF (Keyword)</option>
        </select>
      </div>
    </aside>

    <main id="chat-container">
      <div class="chat-header">
        <div>
          <p class="chat-kicker">Study Chat Workspace</p>
          <h2 class="panel-title">AI Chat</h2>
        </div>
      </div>

      <div id="messages"></div>

      <div class="chat-footer">
        <input
          type="text"
          id="user-input"
          placeholder="Begin chatting..."
          autocomplete="off"
        />
        <button id="send-btn">Send</button>
      </div>
    </main>
  </div>

  <aside id="rag-panel" aria-hidden="true">
    <div class="rag-header">
      <div>
        <p class="chat-kicker">Linked Context</p>
        <h2 class="panel-title">Retrieved Evidence</h2>
      </div>
      <button type="button" id="close-rag-btn" aria-label="Close evidence panel">Close</button>
    </div>

    <div class="rag-section">
      <p id="evidence-empty" class="rag-empty">Select the evidence link under an assistant response.</p>
      <div id="evidence-list"></div>
    </div>

    <div class="rag-section metrics-section">
      <h3 class="section-label">Confidence Metric</h3>
      <div class="doc-item"><span>Overall</span><span id="metric-overall">N/A</span></div>
      <div class="doc-item"><span>Retrieval</span><span id="metric-retrieval">N/A</span></div>
      <div class="doc-item"><span>Response</span><span id="metric-response">N/A</span></div>
      <div class="doc-item"><span>Method</span><span id="metric-method">N/A</span></div>
    </div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
